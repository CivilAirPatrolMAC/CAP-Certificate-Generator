<main class="app-shell">
  <header class="page-header">
    <div class="page-header__inner">
      <div>
        <p class="eyebrow">Civil Air Patrol Brand Tools</p>
        <h1>Promotion Certificate Generator</h1>
        <p class="lede">
          Generate printable certificates for cadet promotions.
        </p>
      </div>
    </div>
  </header>

  <section class="layout">

    <!-- LEFT: CONTROLS -->
    <div class="controls-column">
      <article class="card form-section">

        <div class="section-heading">
          <h2>Certificate details</h2>
        </div>

        <div class="form-grid">
          <div class="field field--full">
            <label>Cadet Name</label>
            <input id="name">
          </div>

          <div class="field">
            <label>Rank</label>
            <select id="rank"></select>
          </div>

          <div class="field">
            <label>Date</label>
            <input type="date" id="date">
          </div>
        </div>

        <div class="button-row">
          <button id="printBtn" class="button button--primary">
            Print / Save PDF
          </button>
        </div>

      </article>
    </div>

    <!-- RIGHT: PREVIEW -->
    <div class="preview-column">
      <div class="preview-sticky">
        <article class="card preview-card">

          <div class="preview-surface">
            <section class="certificate">

              <div class="certificate__inner">
                <div class="certificate__org">
                  Civil Air Patrol • United States Air Force Auxiliary
                </div>

                <h2 class="certificate__title">
                  Certificate of Promotion
                </h2>

                <div>This certifies that</div>

                <div id="previewName" class="certificate__name">
                  Name
                </div>

                <div>has been promoted to</div>

                <div id="previewRank" class="certificate__rank">
                  Rank
                </div>

                <div id="previewDate"></div>
              </div>

            </section>
          </div>

        </article>
      </div>
    </div>

  </section>
</main>

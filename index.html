<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAP Certificate Generator</title>

  <link rel="stylesheet" href="styles.css" />

  <!-- PDF LIB -->
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

<main class="app-shell">

  <header class="page-header">
    <div class="page-header__inner">
      <p class="eyebrow">Civil Air Patrol • Brand Tools</p>
      <h1>Achievement Certificate Generator</h1>
    </div>
  </header>

  <section class="layout">

    <div class="controls-column card">

      <h2>Details</h2>

      <label>Achievement</label>
      <input id="achievementNumber" value="ACHIEVEMENT 7">

      <label>Achievement Title</label>
      <input id="achievementTitle" value="Dr. Robert Goddard">

      <label>Cadet Name</label>
      <input id="cadetName" value="Hanniah Beacham">

      <label>Cadet Rank</label>
      <input id="cadetRank" value="CADET CHIEF MASTER SERGEANT">

      <label>Date</label>
      <input id="promotionDate" type="date">

      <label>Unit Line</label>
      <input id="unitLine" value="Fort Worth Composite Squadron, Fort Worth, Texas">

      <label>Left Signature Name</label>
      <input id="leftSignerName" value="Roman Vitanza">

      <label>Left Signature Title</label>
      <input id="leftSignerTitle" value="Squadron Commander">

      <label>Right Signature Name</label>
      <input id="rightSignerName" value="Joshua Bouldin">

      <label>Right Signature Title</label>
      <input id="rightSignerTitle" value="Deputy Commander for Cadets">

      <button id="downloadBtn">Download PDF</button>

    </div>

  </section>

</main>

<script src="script.js"></script>
</body>
</html>
